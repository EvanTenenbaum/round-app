# railway.toml — Round API deployment on Railway

[build]
builder = "NIXPACKS"
buildCommand = "yarn workspace @round/api build && yarn workspace @round/api db:migrate:deploy"

[deploy]
startCommand = "yarn workspace @round/api start"
healthcheckPath = "/health"
healthcheckTimeout = 10
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "round-api"
